version: "2"
sql:
  - engine: "postgresql"
    schema:
      - db/schema.sql
    queries: "db/queries/tasks.sql"
    gen:
      go:
        package: db
        out: "internal/persistence/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
