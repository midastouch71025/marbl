openapi: 3.0.3
info:
  title: Marbl Consumer API
  version: 0.1.0
  description: |
    HTTP contract for task ingestion. The producer persists tasks in Postgres,
    then POSTs here with the database-assigned `id`.
servers:
  - url: http://localhost:8080
    description: Local consumer (LISTEN_ADDR)
paths:
  /tasks:
    post:
      summary: Ingest or acknowledge a task
      operationId: ingestTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
            examples:
              valid:
                value:
                  id: 1
                  type: 3
                  value: 42
      responses:
        '200':
          description: Duplicate-safe success (already processing or done)
        '202':
          description: Accepted for processing
        '400':
          description: Invalid payload
        '404':
          description: Unknown task id
        '429':
          description: Rate limited
        '5xx':
          description: Transient server error
components:
  schemas:
    TaskRequest:
      type: object
      required: [id, type, value]
      properties:
        id:
          type: integer
          format: int64
          description: Producer-persisted primary key
        type:
          type: integer
          minimum: 0
          maximum: 9
        value:
          type: integer
          minimum: 0
          maximum: 99
